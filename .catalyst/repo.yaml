# Catalyst Repository Metadata
# This file defines metadata for each repository to be used by the profile page generator
version: "0.1.1"
# Repository Information
name: "git-repo-template"
description: "Common build tools and release automation for CI/CD across all repositories"
repo_url: "https://github.com/TheBranchDriftCatalyst/git-repo-template"

# Repository Status (active, archived, wip, experimental)
status: "active"

# Tech Stack
tech_stack:
  languages:
  - "bash"
  - "yaml"
  frameworks: []
  tools:
  - "git"
  - "lefthook"
  - "release-please"
  - "task"
  - "docker"
  - "github-actions"

# Grouping/Categories (for organizing on profile page)
groups:
- "build-tools"
- "devops"
- "templates"

# Badge Configuration (optional - will use defaults if not specified)
badges:
  stars: true
  issues: true
  prs: true
  license: true

# Custom highlights (optional - used for non-AI manual highlights)
highlights:
- "Language-agnostic release automation"
- "Conventional commits enforcement via git hooks"
- "Automated changelog generation with release-please"
- "Multi-arch Docker build support"
- "Works as git submodule for shared tooling"
